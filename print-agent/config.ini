[agent]

# URL base do servidor (somente host e porta — sem caminhos como /login, /home, etc.)
# Exemplos:
#   server_url = https://meu-servidor.replit.app
#   server_url = http://192.168.1.100:5000
server_url = https://SEU-SERVIDOR-AQUI.replit.app

# Token gerado pelo painel Admin → Agentes de Impressão
# Cole aqui o token completo exibido ao criar o agente
token = COLE_O_TOKEN_AQUI

# ID único desta máquina (será usado no nome da impressora: MACHINEID\Impressora)
# Se deixar em branco, será usado o nome do computador (hostname)
machine_id =

# Intervalo de reconexão em segundos (padrão: 5)
reconnect_seconds = 5

# Intervalo de ping em segundos (padrão: 20)
ping_interval = 20

# Verificar certificado SSL do servidor? (padrão: true)
# Mudar para false APENAS se o servidor usar certificado autoassinado
verify_ssl = true
